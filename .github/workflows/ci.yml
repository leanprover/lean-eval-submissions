# CI for the submission pipeline. This repo is pure Python + workflows;
# there is no Lean build here. The benchmark and the comparator/sandbox
# integration live in leanprover/lean-eval and are exercised by that
# repo's CI. See SECURITY.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout pinned to 11bd7190 (= refs/tags/v4.2.2 as of 2026-05-04).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python pinned to a26af69b (= refs/tags/v5.6.0 as of 2026-05-04).
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11.10'

      # actions/setup-go pinned to d35c59ab (= refs/tags/v5.5.0 as of 2026-05-04).
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.24.0'

      - name: Install actionlint
        run: |
          # actionlint pinned to 914e7df2 (= refs/tags/v1.7.12 as of 2026-05-19).
          go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Python syntax checks
        run: python -m py_compile scripts/*.py tests/*.py

      - name: Audit workflow action pins
        run: python scripts/action_pin_audit.py

      - name: Lint workflows
        run: actionlint

      - name: Workflow-structure test
        # Asserts the submission.yml invariants the cross-repo rewrite is
        # most likely to break (two checkouts, persist-credentials, the
        # benchmark-commit source, probe paths, the separate results-store
        # checkout). See tests/test_submission_workflow.py.
        run: python -m unittest tests.test_submission_workflow

      - name: Leaderboard update tests
        run: python -m unittest tests.test_update_leaderboard

      - name: Fetch submission tests
        run: python -m unittest tests.test_fetch_submission

      - name: Evaluate submission tests
        run: python -m unittest tests.test_evaluate_submission
